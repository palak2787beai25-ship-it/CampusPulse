<!DOCTYPE html>
<html>
<head>
    <title>Welcome | CampusPulse</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body{
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        .container h1{
            color: #333;
            margin-bottom: 10px;
        }

        .container p{
            color: #777;
            margin-bottom: 30px;
        }

        .btn{
            display: inline-block;
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 25px;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn{
            background: #667eea;
            color: white;
        }

        .login-btn:hover{
            background: #5a67d8;
        }

        .signup-btn{
            background: #764ba2;
            color: white;
        }

        .signup-btn:hover{
            background: #6b46c1;
        }
    </style>
</head>


<body>

    <div class="container">
        <h1>Welcome to CampusPulse 🎓</h1>
        <p>Your one-stop platform for campus updates and student management.</p>

        <a href="login.html" class="btn login-btn">Login</a>
        <a href="signup.html" class="btn signup-btn">Sign Up</a>
    </div>

</body>
</html>
